name: 🚀 Deploy to Hostinger

on:
  push:
    branches:
      - main  # Triggers on every push to main branch

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # Step 4: Build the Next.js static site
      - name: 🏗️ Build Static Site
        run: npm run build
        # This generates the /out folder with static HTML/CSS/JS

      # Step 5: Deploy the /out folder to Hostinger via FTP
      - name: 🚚 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/         # Next.js static export output folder
          server-dir: /public_html/ # Hostinger's web root directory
          dangerous-clean-slate: false # Set to true to delete all remote files first (careful!)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
